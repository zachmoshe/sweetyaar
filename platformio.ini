; SweetYaar Baby BT Speaker Controller
; Target: ESP32-WROOM-32 (original ESP32 only — required for BT Classic A2DP)
; Phase 2: Core firmware + Web BLE parent controls

[platformio]
default_envs = esp32dev

[common]
build_flags =
    ; Required for arduino-audio-tools to find SD source
    -DAUDIO_TOOLS_PREFER_SD
    ; Arduino-ESP32's bundled I2S library emits a deprecated ADC constant warning.
    -Wno-deprecated-declarations

[env:esp32dev]
platform = espressif32@^6.0.0
board = esp32dev
framework = arduino
build_src_filter =
    +<*>
    -<sd_diagnostic.cpp>
    -<audio_diagnostic.cpp>
    -<bt_diagnostic.cpp>

monitor_speed = 115200
upload_speed = 921600

; min_spiffs gives ~1.9MB per OTA partition — enough for BT + audio stack
board_build.partitions = min_spiffs.csv

lib_deps =
    https://github.com/pschatzmann/ESP32-A2DP.git#812ed5e27b88c8ce0a5f97e15d37c6de2b7ad40b
    https://github.com/pschatzmann/arduino-audio-tools.git#1da31e372a651326f0bfe6949c2efba8ea35d213
    bblanchon/ArduinoJson @ 7.4.3

build_flags =
    -DCORE_DEBUG_LEVEL=1
    ${common.build_flags}

[env:btdebug]
extends = env:esp32dev
build_flags =
    -DCORE_DEBUG_LEVEL=1
    ${common.build_flags}
    -DSWEETYAAR_BT_DEBUG=1

[env:sdtest]
extends = env:esp32dev
build_src_filter =
    -<*>
    +<sd_diagnostic.cpp>

[env:audiotest]
extends = env:esp32dev
build_src_filter =
    -<*>
    +<audio_diagnostic.cpp>

[env:bttest]
extends = env:esp32dev
build_src_filter =
    -<*>
    +<bt_diagnostic.cpp>
